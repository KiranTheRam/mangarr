services:
  mangarr:
    image: kirantheram/mangarr:latest
    container_name: mangarr
    ports:
      - "6996:6996"
    volumes:
      - ./data/mangarr-config:/config
      # Mount the same media path in your existing qBittorrent container so
      # Mangarr can import completed downloads and hardlink them into the library.
      - ./data/media:/media
    restart: unless-stopped
