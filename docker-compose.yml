services:
  mangarr:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: mangarr
    ports:
      - "6996:6996"
    volumes:
      - ./data/mangarr-config:/config
      - ./data/manga:/manga
      # qBittorrent's download dir must be visible at the same path mangarr
      # sees when importing completed torrents
      - ./data/downloads:/downloads
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mangarr-qbittorrent
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Etc/UTC
      - WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - ./data/qbittorrent-config:/config
      - ./data/downloads:/downloads
    restart: unless-stopped
